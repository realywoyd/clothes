<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор расчёта стоимости печати на одежде</title>
<style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:1080px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}
h1{margin:0;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);gap:22px;padding:12px 22px 22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px;min-width:0}
.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.step+.step{margin-top:18px}
.step.is-hidden{display:none}
.step h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.seg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}
.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.btn:disabled,.sw:disabled,.mini-btn:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none;background:#fafafa}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,52px);gap:12px}
.sw{width:52px;height:52px;border-radius:50%;border:2px solid #d7d7d7;cursor:pointer;background:var(--sw);transition:.18s ease}
.sw.white{box-shadow:inset 0 0 0 1px #d8d8d8}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.14)}
.color-note{color:#c62828;font-size:13px;line-height:1.4;margin-top:10px;font-weight:700}
.place-list{display:grid;gap:12px}
.place-card{border:1px solid #dfece2;border-radius:18px;padding:14px;background:#fff}
.place-card.is-on{background:#f9fdf9;border-color:#cce2d3}
.place-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
.place-name{font-size:16px;font-weight:800}
.toggle{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer}
.toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.colors-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.color-buttons{display:grid;grid-template-columns:repeat(7,minmax(40px,1fr));gap:8px}
.mini-btn{border:1.5px solid var(--line);background:#fff;border-radius:12px;min-height:42px;padding:6px 8px;cursor:pointer;font-size:13px;font-weight:800}
.mini-btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.sum{display:grid;gap:14px;min-width:0}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}
.row:last-child{border-bottom:none;padding-bottom:0}
.row strong{color:#191919}
.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}
.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
.note,.status{font-size:12px;color:var(--muted);line-height:1.45;margin-top:10px}
.warn{margin-top:10px;padding:10px 12px;border-radius:12px;background:#fff8e8;border:1px solid #f2dfaa;font-size:13px;color:#6a5722}
@media (max-width:980px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
@media (max-width:560px){
  body{padding:10px 8px}
  .wrap{border-radius:22px}
  .head{padding:18px 14px 10px}
  h1{font-size:24px}
  .grid{padding:10px;gap:10px}
  .panel,.card{padding:14px;border-radius:18px}
  .seg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .btn{min-height:46px;padding:8px;font-size:13px;border-radius:12px}
  .swatches{grid-template-columns:repeat(4,52px);gap:10px}
  .sw{width:48px;height:48px}
  .place-top{align-items:flex-start;flex-direction:column}
  .colors-row{grid-template-columns:1fr}
  .color-buttons{grid-template-columns:repeat(4,minmax(38px,1fr))}
  .badge{font-size:12px;padding:7px 10px}
  .row{font-size:12px}
  .total{font-size:28px}
  .color-note{font-size:12px}
}
</style>
</head>
<body>
<section class="wrap">
  <div class="head"><h1>Калькулятор расчёта стоимости печати на одежде</h1></div>
  <div class="grid" id="app"></div>
</section>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwR2h6XYOaDt9-qaeAc754sdYJTIFFeo35p_PxerYPPsgZfgo0XyzqtZTKGFI7hqfOJ/exec';

const APP = {
  genders:[
    {id:'male',label:'Мужской'},
    {id:'female',label:'Женский'}
  ],
  colors:[
    {id:'Белый',label:'Белый',hex:'#ffffff',className:'white'},
    {id:'Чёрный',label:'Чёрный',hex:'#111111'},
    {id:'Синий',label:'Синий',hex:'#295bc8'},
    {id:'Красный',label:'Красный',hex:'#d64242'}
  ],
  printColors:[0,1,2,3,4,5,6],
  places:[
    {id:'chest',label:'Грудь'},
    {id:'back',label:'Спина'},
    {id:'leftSleeve',label:'Левый рукав'},
    {id:'rightSleeve',label:'Правый рукав'}
  ]
};

const money = v => new Intl.NumberFormat('ru-RU', {maximumFractionDigits:0}).format(Math.round(v || 0)) + ' руб.';
const n0 = v => new Intl.NumberFormat('ru-RU', {maximumFractionDigits:0}).format(v || 0);

let TABLE = [];
let DATA_SOURCE_LABEL = '';

function normalizeGender(value) {
  const v = String(value || '').trim().toLowerCase();
  if (v === 'male' || v === 'мужское' || v === 'мужской') return 'male';
  if (v === 'female' || v === 'женское' || v === 'женский') return 'female';
  return '';
}

function genderLabel(id) {
  return id === 'male' ? 'Мужской' : id === 'female' ? 'Женский' : '';
}

function normalizeRow(row) {
  return {
    gender: normalizeGender(row.gender),
    product: String(row.product || '').trim(),
    material: String(row.material || '').trim(),
    color: String(row.color || '').trim(),
    qty: Number(row.qty || 0),
    print_1: Number(row.print_1 || 0),
    print_2: Number(row.print_2 || 0),
    print_3: Number(row.print_3 || 0),
    print_4: Number(row.print_4 || 0),
    print_5: Number(row.print_5 || 0),
    print_6: Number(row.print_6 || 0)
  };
}

function loadJsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName = '__clothesCallback_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const sep = url.includes('?') ? '&' : '?';
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Таймаут загрузки данных'));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
    }

    window[callbackName] = (data) => {
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('Ошибка загрузки скрипта'));
    };

    script.src = url + sep + 'callback=' + encodeURIComponent(callbackName);
    document.body.appendChild(script);
  });
}

async function initTable() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') {
    return { ok:false, error:'Не вставлен URL Apps Script' };
  }

  try {
    const data = await loadJsonp(APPS_SCRIPT_URL);
    if (!data || !data.ok) throw new Error((data && data.error) || 'Пустой ответ Apps Script');
    if (!Array.isArray(data.items) || !data.items.length) throw new Error('Apps Script вернул пустую таблицу');

    TABLE = data.items
      .map(normalizeRow)
      .filter(r =>
        r.gender &&
        r.product &&
        r.material &&
        r.color &&
        r.qty &&
        ['Белый','Чёрный','Синий','Красный'].includes(r.color)
      );

    DATA_SOURCE_LABEL = 'Google Sheets (Apps Script)';
    return { ok:true };
  } catch (err) {
    TABLE = [];
    DATA_SOURCE_LABEL = '';
    return { ok:false, error:'Не удалось загрузить таблицу из Google Sheets: ' + String(err && err.message ? err.message : err) };
  }
}

class Calc {
  constructor(root, initState) {
    this.root = root;
    this.status = initState || { ok:false, error:'Неизвестное состояние' };
    this.s = {
      gender:'',
      product:'',
      material:'',
      color:'',
      qty:null,
      chestEnabled:false,
      chestColors:0,
      backEnabled:false,
      backColors:0,
      leftSleeveEnabled:false,
      leftSleeveColors:0,
      rightSleeveEnabled:false,
      rightSleeveColors:0
    };
    this.render();
  }

  getProducts() {
    if (!this.s.gender) return [];
    const set = new Set(TABLE.filter(r => r.gender === this.s.gender).map(r => r.product));
    return [...set];
  }

  getMaterials() {
    if (!this.s.gender || !this.s.product) return [];
    const set = new Set(TABLE.filter(r => r.gender === this.s.gender && r.product === this.s.product).map(r => r.material));
    return [...set];
  }

  getColors() {
    if (!this.s.gender || !this.s.product || !this.s.material) return [];
    const set = new Set(TABLE.filter(r =>
      r.gender === this.s.gender &&
      r.product === this.s.product &&
      r.material === this.s.material
    ).map(r => r.color));
    return APP.colors.filter(c => set.has(c.label));
  }

  getQtys() {
    if (!this.s.gender || !this.s.product || !this.s.material || !this.s.color) return [];
    const set = new Set(TABLE.filter(r =>
      r.gender === this.s.gender &&
      r.product === this.s.product &&
      r.material === this.s.material &&
      r.color === this.s.color
    ).map(r => Number(r.qty)));
    return [...set].sort((a,b) => a-b);
  }

  findRow() {
    const s = this.s;
    return TABLE.find(r =>
      r.gender === s.gender &&
      r.product === s.product &&
      r.material === s.material &&
      r.color === s.color &&
      Number(r.qty) === Number(s.qty)
    );
  }

  getPrintTotal(row, n) {
    if (!row || !n) return 0;
    return Number(row['print_' + n] || 0);
  }

  btn(label, active, a, v) {
    return '<button type="button" class="btn ' + (active ? 'active' : '') + '" data-a="' + a + '" data-v="' + String(v).replace(/"/g, '&quot;') + '">' + label + '</button>';
  }

  colorSwatch(c) {
    const active = this.s.color === c.label;
    const cls = c.className ? ' ' + c.className : '';
    return '<button type="button" class="sw' + cls + ' ' + (active ? 'active' : '') + '" title="' + c.label + '" aria-label="' + c.label + '" style="--sw:' + c.hex + '" data-a="color" data-v="' + c.label + '"></button>';
  }

  placeCard(place) {
    const s = this.s;
    const enabled = !!s[place.id + 'Enabled'];
    const colors = s[place.id + 'Colors'];
    return '<div class="place-card ' + (enabled ? 'is-on' : '') + '">' +
      '<div class="place-top">' +
        '<div class="place-name">' + place.label + '</div>' +
        '<button type="button" class="toggle ' + (enabled ? 'on' : '') + '" data-a="toggle" data-place="' + place.id + '" data-v="' + (enabled ? 'off' : 'on') + '">' +
          (enabled ? 'Включено' : 'Не выбрано') +
        '</button>' +
      '</div>' +
      '<div class="colors-row">' +
        '<div>Количество цветов печати</div>' +
        '<div class="color-buttons">' +
          APP.printColors.map(num => (
            '<button type="button" class="mini-btn ' + (num === colors ? 'active' : '') + '" data-a="placeColors" data-place="' + place.id + '" data-v="' + num + '" ' + (enabled ? '' : 'disabled') + '>' + (num === 0 ? '—' : num) + '</button>'
          )).join('') +
        '</div>' +
      '</div>' +
    '</div>';
  }

  resetAfterGender() {
    this.s.product=''; this.s.material=''; this.s.color=''; this.s.qty=null;
    this.resetPlaces();
  }

  resetAfterProduct() {
    this.s.material=''; this.s.color=''; this.s.qty=null;
    this.resetPlaces();
  }

  resetAfterMaterial() {
    this.s.color=''; this.s.qty=null;
    this.resetPlaces();
  }

  resetAfterColor() {
    this.s.qty=null;
    this.resetPlaces();
  }

  resetPlaces() {
    this.s.chestEnabled=false; this.s.chestColors=0;
    this.s.backEnabled=false; this.s.backColors=0;
    this.s.leftSleeveEnabled=false; this.s.leftSleeveColors=0;
    this.s.rightSleeveEnabled=false; this.s.rightSleeveColors=0;
  }

  render() {
    const s = this.s;
    const products = this.getProducts();
    const materials = this.getMaterials();
    const availableColors = this.getColors();
    const qtys = this.getQtys();
    const row = this.findRow();

    const chest = s.chestEnabled ? this.getPrintTotal(row, s.chestColors) : 0;
    const back = s.backEnabled ? this.getPrintTotal(row, s.backColors) : 0;
    const leftSleeve = s.leftSleeveEnabled ? this.getPrintTotal(row, s.leftSleeveColors) : 0;
    const rightSleeve = s.rightSleeveEnabled ? this.getPrintTotal(row, s.rightSleeveColors) : 0;
    const total = chest + back + leftSleeve + rightSleeve;

    this.root.innerHTML =
      '<div class="panel">' +
        '<div class="step">' +
          '<h3>Выберите пол</h3>' +
          '<div class="seg">' + APP.genders.map(i => this.btn(i.label, s.gender === i.id, 'gender', i.id)).join('') + '</div>' +
        '</div>' +

        '<div class="step ' + (s.gender ? '' : 'is-hidden') + '">' +
          '<h3>Модель</h3>' +
          '<div class="seg">' + products.map(i => this.btn(i, s.product === i, 'product', i)).join('') + '</div>' +
        '</div>' +

        '<div class="step ' + ((s.gender && s.product) ? '' : 'is-hidden') + '">' +
          '<h3>Материал</h3>' +
          '<div class="seg">' + materials.map(i => this.btn(i, s.material === i, 'material', i)).join('') + '</div>' +
        '</div>' +

        '<div class="step ' + ((s.gender && s.product && s.material) ? '' : 'is-hidden') + '">' +
          '<h3>Цвет изделия</h3>' +
          '<div class="swatches">' + availableColors.map(c => this.colorSwatch(c)).join('') + '</div>' +
          '<div class="color-note">*Возможен пошив в других цветах — уточняйте у менеджера.</div>' +
        '</div>' +

        '<div class="step ' + ((s.gender && s.product && s.material && s.color) ? '' : 'is-hidden') + '">' +
          '<h3>Тираж</h3>' +
          '<div class="seg">' + qtys.map(i => this.btn(i + ' шт.', s.qty === i, 'qty', i)).join('') + '</div>' +
        '</div>' +

        '<div class="step ' + ((s.gender && s.product && s.material && s.color && s.qty) ? '' : 'is-hidden') + '">' +
          '<h3>Места нанесения</h3>' +
          '<div class="place-list">' + APP.places.map(p => this.placeCard(p)).join('') + '</div>' +
        '</div>' +
      '</div>' +

      '<div class="sum">' +
        '<div class="card">' +
          '<div class="badges">' +
            (s.gender ? '<div class="badge">' + genderLabel(s.gender) + '</div>' : '') +
            (s.product ? '<div class="badge">' + s.product + '</div>' : '') +
            (s.material ? '<div class="badge">' + s.material + '</div>' : '') +
            (s.color ? '<div class="badge">' + s.color + '</div>' : '') +
            (s.qty ? '<div class="badge">' + n0(s.qty) + ' шт.</div>' : '') +
            (s.chestEnabled && s.chestColors ? '<div class="badge">Грудь: ' + s.chestColors + ' цв.</div>' : '') +
            (s.backEnabled && s.backColors ? '<div class="badge">Спина: ' + s.backColors + ' цв.</div>' : '') +
            (s.leftSleeveEnabled && s.leftSleeveColors ? '<div class="badge">Левый рукав: ' + s.leftSleeveColors + ' цв.</div>' : '') +
            (s.rightSleeveEnabled && s.rightSleeveColors ? '<div class="badge">Правый рукав: ' + s.rightSleeveColors + ' цв.</div>' : '') +
          '</div>' +
        '</div>' +

        '<div class="card totalcard">' +
          '<h3>Итоговая стоимость</h3>' +
          '<div class="total">' + money(total) + '</div>' +
          '<div style="color:#a94442; font-size:12px; margin-top:6px; line-height:1.3;">' +
            '*Предварительная стоимость. Для точного расчёта уточняйте у менеджера.' +
          '</div>' +
          ((this.status && this.status.ok === false && this.status.error)
            ? '<div class="warn">' + this.status.error + '</div>'
            : '') +
        '</div>' +
      '</div>';

    this.root.querySelectorAll('[data-a]').forEach(el => el.addEventListener('click', () => {
      const a = el.dataset.a;
      let v = el.dataset.v;
      if (['qty', 'placeColors'].includes(a)) v = Number(v);

      if (a === 'gender') {
        s.gender = v;
        this.resetAfterGender();
      }
      if (a === 'product') {
        s.product = v;
        this.resetAfterProduct();
      }
      if (a === 'material') {
        s.material = v;
        this.resetAfterMaterial();
      }
      if (a === 'color') {
        s.color = v;
        this.resetAfterColor();
      }
      if (a === 'qty') {
        s.qty = v;
        this.resetPlaces();
      }

      if (a === 'toggle') {
        const p = el.dataset.place;
        const nextOn = v === 'on';
        s[p + 'Enabled'] = nextOn;
        if (!nextOn) s[p + 'Colors'] = 0;
        if (nextOn && !s[p + 'Colors']) s[p + 'Colors'] = 1;
      }

      if (a === 'placeColors') {
        const p = el.dataset.place;
        s[p + 'Colors'] = v;
        s[p + 'Enabled'] = v > 0;
      }

      this.render();
    }));
  }
}

(async () => {
  const initState = await initTable();
  new Calc(document.getElementById('app'), initState);
})();
</script>
</body>
</html>
